<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>XAUChart | ساعت بازار طلا</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#0b1220;
    color:#ffffff;
    font-family:Tahoma, sans-serif;
}

.container{
    max-width:1200px;
    margin:auto;
    padding:20px;
}

header{
    text-align:center;
    padding:50px 0;
}

header h1{
    font-size:48px;
    margin-bottom:10px;
}

header p{
    color:#94a3b8;
}

#utc-clock{
    margin-top:15px;
    color:#60a5fa;
    font-size:18px;
}

.grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
    gap:20px;
    margin-top:30px;
}

.card{
    background:#111827;
    border:1px solid #1f2937;
    border-radius:15px;
    padding:25px;
    text-align:center;
}

.card h3{
    margin-bottom:15px;
}

.status{
    display:inline-block;
    padding:8px 16px;
    border-radius:8px;
    font-weight:bold;
}

.open{
    background:#064e3b;
    color:#4ade80;
}

.closed{
    background:#450a0a;
    color:#f87171;
}

.price-card{
    margin-top:25px;
    background:#111827;
    border:1px solid #1f2937;
    border-radius:15px;
    padding:25px;
    text-align:center;
}

#gold-price{
    margin-top:10px;
    font-size:28px;
    font-weight:bold;
    color:#fbbf24;
}

footer{
    text-align:center;
    margin-top:50px;
    padding:20px;
    color:#64748b;
}
</style>

</head>
<body>

<div class="container">

<header>
    <h1>XAUChart</h1>
    <p>وضعیت سشن‌های بازار و قیمت جهانی طلا</p>

    <div id="utc-clock">
        در حال بارگذاری ساعت...
    </div>
</header>

<div class="grid">

    <div class="card">
        <h3>لندن</h3>
        <div id="london" class="status">
            ...
        </div>
    </div>

    <div class="card">
        <h3>نیویورک</h3>
        <div id="newyork" class="status">
            ...
        </div>
    </div>

    <div class="card">
        <h3>توکیو</h3>
        <div id="tokyo" class="status">
            ...
        </div>
    </div>

    <div class="card">
        <h3>سیدنی</h3>
        <div id="sydney" class="status">
            ...
        </div>
    </div>

</div>

<div class="price-card">
    <h2>قیمت جهانی طلا (XAU/USD)</h2>
    <div id="gold-price">
        در حال دریافت...
    </div>
</div>

<footer>
    © 2026 XAUChart.ir
</footer>

</div>

<script>

function isOpen(start,end,hour){
    if(start < end){
        return hour >= start && hour < end;
    }
    return hour >= start || hour < end;
}

function setStatus(id,isOpened){

    const el = document.getElementById(id);

    if(isOpened){
        el.className = "status open";
        el.innerText = "باز";
    }else{
        el.className = "status closed";
        el.innerText = "بسته";
    }
}

function updateSessions(){

    const now = new Date();

    const h = now.getUTCHours();
    const m = now.getUTCMinutes();
    const s = now.getUTCSeconds();

    document.getElementById("utc-clock").innerText =
    `UTC : ${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;

    setStatus("london",isOpen(8,17,h));
    setStatus("newyork",isOpen(13,22,h));
    setStatus("tokyo",isOpen(0,9,h));
    setStatus("sydney",isOpen(22,7,h));
}

async function getGoldPrice(){

    try{

        const response = await fetch(
            "https://api.gold-api.com/price/XAU",
            {
                method:"GET",
                headers:{
                    "Content-Type":"application/json"
                }
            }
        );

        const data = await response.json();

        document.getElementById("gold-price").innerText =
            data.price + " USD";

    }
    catch(error){

        document.getElementById("gold-price").innerText =
            "خطا در دریافت قیمت";

        console.log(error);
    }
}

updateSessions();
setInterval(updateSessions,1000);

getGoldPrice();
setInterval(getGoldPrice,10000);

</script>

</body>
</html>
