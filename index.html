<!DOCTYPE html>
<html lang="fa" dir="rtl">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>XAUChart | قیمت طلا و ارز</title>

<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

<header>

<h1>XAUChart</h1>

<p class="subtitle">
قیمت لحظه‌ای طلا، ارز و وضعیت بازارهای جهانی
</p>

<div id="utc-clock">
--:--:--
</div>

</header>

<section>

<h2 class="section-title">
وضعیت سشن‌های بازار
</h2>

<div class="session-grid">

<div class="session-card">
<h3>لندن</h3>
<div id="london"></div>
</div>

<div class="session-card">
<h3>نیویورک</h3>
<div id="newyork"></div>
</div>

<div class="session-card">
<h3>توکیو</h3>
<div id="tokyo"></div>
</div>

<div class="session-card">
<h3>سیدنی</h3>
<div id="sydney"></div>
</div>

</div>

</section>

<div class="hero-card">

<h2>انس جهانی طلا</h2>

<div id="xau" class="hero-price">
...
</div>

<div class="hero-unit">
USD
</div>

</div>

<section>

<div class="market-grid">

<div class="small-card">
<h3>دلار</h3>
<div id="usd" class="small-price">...</div>
</div>

<div class="small-card">
<h3>تتر</h3>
<div id="usdt" class="small-price">...</div>
</div>

<div class="small-card">
<h3>طلای ۱۸ عیار</h3>
<div id="gold18" class="small-price">...</div>
</div>

<div class="small-card">
<h3>طلای آب شده</h3>
<div id="melted" class="small-price">...</div>
</div>

<div class="small-card">
<h3>سکه امامی</h3>
<div id="emami" class="small-price">...</div>
</div>

<div class="small-card">
<h3>نیم سکه</h3>
<div id="half" class="small-price">...</div>
</div>

</div>

</section>

<footer>

آخرین بروزرسانی:
<span id="last-update">--</span>

</footer>

</div>

<script src="script.js"></script>

</body>
</html>
