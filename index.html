<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>XAUChart | ابزار بازار طلا</title>

<style>
body{
  margin:0;
  font-family:Tahoma, Arial;
  background:#0b1220;
  color:#e5e7eb;
}

header{
  text-align:center;
  padding:70px 20px 40px;
}

h1{
  font-size:48px;
  margin:0;
}

.sub{
  color:#94a3b8;
  margin-top:10px;
}

.time{
  margin-top:15px;
  color:#60a5fa;
  font-size:14px;
}

/* GRID */
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
  gap:20px;
  padding:40px;
}

/* CARD */
.card{
  background:#111a2e;
  border:1px solid #1f2a44;
  border-radius:14px;
  padding:20px;
  text-align:center;
}

/* BADGE */
.badge{
  display:inline-block;
  margin-top:10px;
  padding:6px 12px;
  border-radius:8px;
  font-size:13px;
  font-weight:bold;
}

.open{
  background:#0f5132;
  color:#4ade80;
}

.closed{
  background:#3f1d1d;
  color:#f87171;
}

footer{
  text-align:center;
  padding:30px;
  color:#64748b;
  font-size:12px;
}
</style>
</head>

<body>

<header>
  <h1>XAUChart</h1>
  <div class="sub">وضعیت سشن‌های بازار طلا و فارکس</div>
  <div class="time" id="time">ساعت UTC: --:--:--</div>
</header>

<section class="grid">

  <div class="card">
    <h3>لندن</h3>
    <div id="london" class="badge">...</div>
  </div>

  <div class="card">
    <h3>نیویورک</h3>
    <div id="newyork" class="badge">...</div>
  </div>

  <div class="card">
    <h3>توکیو</h3>
    <div id="tokyo" class="badge">...</div>
  </div>

  <div class="card">
    <h3>سیدنی</h3>
    <div id="sydney" class="badge">...</div>
  </div>

</section>

<footer>
  © 2026 XAUChart | ابزار تحلیل بازار طلا
</footer>

<script>
function isOpen(start,end,h){
  if(start < end){
    return h >= start && h < end;
  }
  return h >= start || h < end;
}

function update(){
  const now = new Date();
  const h = now.getUTCHours();
  const m = now.getUTCMinutes();
  const s = now.getUTCSeconds();

  document.getElementById("time").innerText =
    `ساعت UTC: ${h.toString().padStart(2,'0')}:${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}`;

  set("london", isOpen(8,17,h));
  set("newyork", isOpen(13,22,h));
  set("tokyo", isOpen(0,9,h));
  set("sydney", isOpen(22,7,h));
}

function set(id, open){
  const el = document.getElementById(id);
  el.className = open ? "badge open" : "badge closed";
  el.innerText = open ? "باز" : "بسته";
}

update();
setInterval(update,1000);
</script>

</body>
</html>
