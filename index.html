<!DOCTYPE html>
<html lang="fa" dir="rtl">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>XAUChart | قیمت طلا و ارز</title>

<link rel="stylesheet" href="style.css">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:tahoma;
}

body{
background:#0b1220;
color:white;
}

.container{
max-width:1200px;
margin:auto;
padding:20px;
}

header{
text-align:center;
padding:40px 0;
}

header h1{
font-size:42px;
margin-bottom:10px;
}

.subtitle{
color:#94a3b8;
}

#utc-clock{
margin-top:15px;
color:#60a5fa;
font-size:18px;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:20px;
margin-top:25px;
}

.card{
background:#111827;
padding:25px;
border-radius:15px;
border:1px solid #1f2937;
text-align:center;
}

.card h3{
margin-bottom:15px;
}

.price{
font-size:28px;
font-weight:bold;
color:#fbbf24;
}

.unit{
color:#94a3b8;
margin-top:8px;
}

.status{
padding:8px 15px;
border-radius:8px;
display:inline-block;
font-weight:bold;
}

.open{
background:#064e3b;
color:#4ade80;
}

.closed{
background:#450a0a;
color:#f87171;
}

footer{
margin-top:50px;
padding:20px;
text-align:center;
color:#64748b;
}

</style>

</head>

<body>

<div class="container">

<header>

<h1>XAUChart</h1>

<div class="subtitle">
قیمت طلا، ارز و وضعیت بازارهای جهانی
</div>

<div id="utc-clock"></div>

</header>

<div class="grid">

<div class="card">
<h3>انس جهانی طلا</h3>
<div class="price" id="xau">...</div>
<div class="unit">دلار</div>
</div>

<div class="card">
<h3>دلار</h3>
<div class="price" id="usd">...</div>
<div class="unit">تومان</div>
</div>

<div class="card">
<h3>تتر</h3>
<div class="price" id="usdt">...</div>
<div class="unit">تومان</div>
</div>

<div class="card">
<h3>طلای ۱۸ عیار</h3>
<div class="price" id="gold18">...</div>
<div class="unit">تومان</div>
</div>

<div class="card">
<h3>طلای آب شده</h3>
<div class="price" id="melted">...</div>
<div class="unit">تومان</div>
</div>

</div>

<h2 style="margin-top:40px;text-align:center">
سشن‌های بازار
</h2>

<div class="grid">

<div class="card">
<h3>لندن</h3>
<div id="london"></div>
</div>

<div class="card">
<h3>نیویورک</h3>
<div id="newyork"></div>
</div>

<div class="card">
<h3>توکیو</h3>
<div id="tokyo"></div>
</div>

<div class="card">
<h3>سیدنی</h3>
<div id="sydney"></div>
</div>

</div>

<footer>

آخرین بروزرسانی:
<span id="last-update">--</span>

</footer>

</div>

<script src="script.js"></script>

</body>
</html>
