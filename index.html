<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>XAUChart | ابزار بازار طلا</title>

<style>
body{
  margin:0;
  font-family:Tahoma, Arial;
  background:#0b1220;
  color:#e5e7eb;
}

header{
  text-align:center;
  padding:60px 20px 30px;
}

h1{
  font-size:42px;
  margin:0;
}

.sub{
  color:#94a3b8;
  margin-top:10px;
}

.time{
  margin-top:12px;
  color:#60a5fa;
  font-size:14px;
}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
  gap:18px;
  padding:30px;
}

.card{
  background:#111a2e;
  border:1px solid #1f2a44;
  border-radius:14px;
  padding:18px;
  text-align:center;
}

.card h3{
  margin:0 0 10px;
}

.badge{
  display:inline-block;
  padding:6px 12px;
  border-radius:8px;
  font-weight:bold;
  font-size:13px;
}

.open{
  background:#0f5132;
  color:#4ade80;
}

.closed{
  background:#3f1d1d;
  color:#f87171;
}

footer{
  text-align:center;
  padding:25px;
  color:#64748b;
  font-size:12px;
}
</style>

</head>

<body>

<header>
  <h1>XAUChart</h1>
  <div class="sub">وضعیت بازار طلا و سشن‌های فارکس</div>
  <div class="time" id="time">UTC: --:--:--</div>
</header>

<section class="grid">

  <div class="card">
    <h3>لندن</h3>
    <div id="london" class="badge">...</div>
  </div>

  <div class="card">
    <h3>نیویورک</h3>
    <div id="newyork" class="badge">...</div>
  </div>

  <div class="card">
    <h3>توکیو</h3>
    <div id="tokyo" class="badge">...</div>
  </div>

  <div class="card">
    <h3>سیدنی</h3>
    <div id="sydney" class="badge">...</div>
  </div>

  <!-- قیمت طلا -->
  <div class="card">
    <h3>قیمت طلا</h3>
    <div id="gold">در حال دریافت...</div>
  </div>

</section>

<footer>
  © 2026 XAUChart
</footer>

<script src="script.js"></script>

</body>
</html>
