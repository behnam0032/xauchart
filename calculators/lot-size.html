<!DOCTYPE html>
<html lang="fa" dir="rtl">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>ماشین حساب حجم معامله | XAUChart</title>

<link rel="stylesheet" href="../assets/css/style.css">

</head>

<body>

<div class="container">

<header>

<div class="logo">
XAUChart
</div>

<div class="subtitle">
ماشین حساب حجم معامله
</div>

</header>

<div class="card">

<h2>محاسبه حجم معامله</h2>

<div class="form-group">
<label>موجودی حساب ($)</label>
<input type="number" id="balance">
</div>

<div class="form-group">
<label>درصد ریسک (%)</label>
<input type="number" id="risk">
</div>

<div class="form-group">
<label>استاپ لاس (پیپ)</label>
<input type="number" id="stop">
</div>

<button onclick="calculateLot()">
محاسبه
</button>

<div class="result" id="result">
---
</div>

</div>

<footer>
xauchart.ir
</footer>

</div>

<script src="../assets/js/common.js"></script>

<script>

function calculateLot(){

const balance =
parseFloat(
document.getElementById("balance").value
);

const risk =
parseFloat(
document.getElementById("risk").value
);

const stop =
parseFloat(
document.getElementById("stop").value
);

if(
!balance ||
!risk ||
!stop
){
return;
}

const riskAmount =
balance * risk / 100;

const lot =
riskAmount / stop;

document.getElementById("result").innerHTML =

`
ریسک دلاری:
<b>${formatNumber(riskAmount)}</b>
<br><br>

حجم تقریبی:
<b>${lot.toFixed(2)} Lot</b>
`;

}

</script>

</body>
</html>
