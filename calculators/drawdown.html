<!DOCTYPE html>
<html lang="fa" dir="rtl">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>ماشین حساب دراداون | XAUChart</title>

<link rel="stylesheet" href="../assets/css/style.css">
</head>

<body>

<div class="container">

<header>

<div class="logo">
XAUChart
</div>

<div class="subtitle">
ماشین حساب دراداون
</div>

</header>

<div class="card">

<h2>محاسبه دراداون</h2>

<div class="form-group">
<label>سرمایه اولیه</label>
<input type="number" id="balance">
</div>

<div class="form-group">
<label>درصد ضرر</label>
<input type="number" id="dd">
</div>

<button onclick="calculate()">
محاسبه
</button>

<div class="result" id="result">
---
</div>

</div>

<footer>
xauchart.ir
</footer>

</div>

<script>

function calculate(){

let balance=
parseFloat(
document.getElementById("balance").value
);

let dd=
parseFloat(
document.getElementById("dd").value
);

let remain=
balance*(1-dd/100);

document.getElementById("result")
.innerText=
formatNumber(remain)+" $";

}

</script>

<script src="../assets/js/common.js"></script>

</body>
</html>
