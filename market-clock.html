<!DOCTYPE html>
<html lang="en">
<head>

<title>Market Clock</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<header>
  <h1>Market Sessions</h1>
  <p>Live Forex & Gold Trading Hours</p>
</header>

<section class="grid">

  <div class="card">
    <h3>London Session</h3>
    <p id="london">Loading...</p>
  </div>

  <div class="card">
    <h3>New York Session</h3>
    <p id="newyork">Loading...</p>
  </div>

  <div class="card">
    <h3>Tokyo Session</h3>
    <p id="tokyo">Loading...</p>
  </div>

  <div class="card">
    <h3>Sydney Session</h3>
    <p id="sydney">Loading...</p>
  </div>

</section>

<script src="script.js"></script>

</body>
</html>
